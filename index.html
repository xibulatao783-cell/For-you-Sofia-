<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sia ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- STEP 1: THE QUESTION -->
    <div id="step1" class="container">
        <img src="https://giphy.com" class="cute-gif">
        <h1 id="questionText">Do you love me? ❤️</h1>
        <div class="btn-group">
            <button id="yesBtn" onclick="showSection('step2')">YES</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">NO</button>
        </div>
    </div>

    <!-- STEP 2: GIFT SELECTION -->
    <div id="step2" class="container hidden">
        <h2 style="font-family: 'Dancing Script', cursive; font-size: 32px; color: #4682B4;">I knew you'd say yes 💕</h2>
        <p style="font-size: 14px; color: #5a8fb9; margin-bottom: 20px;">Choose a gift for you, Sia:</p>
        <div class="gift-grid">
            <div class="gift-box" onclick="showSection('gift1')"><span>🖼️</span><div class="gift-label">MEMORIES</div></div>
            <div class="gift-box" onclick="showSection('gift2')"><span>🎵</span><div class="gift-label">OUR SONG</div></div>
            <div class="gift-box" onclick="showSection('gift3')"><span>✉️</span><div class="gift-label">MESSAGE</div></div>
        </div>
    </div>

    <!-- GIFT 1: PHOTO GALLERY -->
    <div id="gift1" class="container hidden">
        <h2 style="font-family: 'Georgia', serif; font-style: italic; color: #4682B4;">Captured memories</h2>
        <div class="gallery-wrapper">
            <!-- Paalala: Siguraduhin na ang photo1.jpg, photo2.jpg, photo3.jpg ay nasa folder mo -->
            <div class="photo-frame"><img src="photo1.jpg" alt="Memory 1"></div>
            <div class="photo-frame"><img src="photo2.jpg" alt="Memory 2"></div>
            <div class="photo-frame"><img src="photo3.jpg" alt="Memory 3"></div>
        </div>
        <p style="font-size: 13px; color: #5a8fb9; margin-top: 15px;">us. in frames</p>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <!-- GIFT 2: MUSIC PLAYER (Taylor Swift) -->
    <div id="gift2" class="container hidden">
        <div class="player-card">
            <div class="vinyl-disk" id="disk">
                <div class="vinyl-center"></div>
            </div>
            <div class="player-info">
                <p class="dedication">A song that reminds me of us</p>
                <h3 class="song-title">Snow on the Beach</h3>
                <p class="artist-name">Taylor Swift ft. Lana Del Rey</p>
                <!-- YouTube Link for Snow on the Beach -->
                <iframe id="ytPlayer" width="100%" height="100" 
                    src="https://youtube.com" 
                    frameborder="0" style="border-radius: 10px; margin-top: 10px;">
                </iframe>
            </div>
        </div>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <!-- GIFT 3: MESSAGE -->
    <div id="gift3" class="container hidden">
        <div class="message-card">
            <h2 style="font-family: 'Dancing Script', cursive; color: #4682B4; text-align: left;">To Sia,</h2>
            <div id="typewriter" class="message-text"></div>
            <div class="signature">Love you always ❤️</div>
        </div>
        <button class="back-btn" onclick="showSection('step2')">Back to Gifts</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
